services:
  - type: web
    name: uscc-scc-flask
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_DEBUG
        value: "0"
      - key: DATA_PATH
        value: data/knowledge_base.xlsx
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
